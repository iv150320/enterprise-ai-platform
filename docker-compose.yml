version: '3.8'

x-defaults: &defaults
  restart: unless-stopped
  networks:
    - ai-platform
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ─── Core Infrastructure ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *defaults
    environment:
      POSTGRES_DB: enterprise_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    <<: *defaults
    ports:
      - "6380:6379"

  qdrant:
    image: qdrant/qdrant:latest
    <<: *defaults
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    <<: *defaults
    security_opt:
      - seccomp:unconfined
    ports:
      - "8123:8123"
      - "9001:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  # ─── Monitoring ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    <<: *defaults
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    <<: *defaults
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

  # ─── Platform Services ─────────────────────────────────────
  nvidia-nim-gateway:
    build:
      context: ./nvidia-nim-gateway
      dockerfile: backend/Dockerfile
    <<: *defaults
    ports:
      - "8100:8000"
    environment:
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - REDIS_HOST=redis
      # OpenTelemetry — export to the observability platform
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=nvidia-nim-gateway
    depends_on:
      - redis

  financial-ai-copilot:
    build: ./financial-ai-copilot/backend
    <<: *defaults
    ports:
      - "8101:8000"
    environment:
      - NIM_GATEWAY_URL=http://nvidia-nim-gateway:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=financial-ai-copilot
    depends_on:
      - postgres
      - redis
      - nvidia-nim-gateway

  knowledge-assistant:
    build: ./enterprise-knowledge-assistant/backend
    <<: *defaults
    ports:
      - "8102:8000"
    environment:
      - NIM_GATEWAY_URL=http://nvidia-nim-gateway:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=knowledge-assistant
    depends_on:
      - postgres
      - qdrant
      - redis
      - nvidia-nim-gateway

  agent-platform:
    build: ./enterprise-agent-platform/backend
    <<: *defaults
    ports:
      - "8103:8000"
    environment:
      - NIM_GATEWAY_URL=http://nvidia-nim-gateway:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=agent-platform
    depends_on:
      - postgres
      - redis
      - nvidia-nim-gateway

  prompt-platform:
    build: ./prompt-evaluation-platform/backend
    <<: *defaults
    ports:
      - "8104:8000"
    environment:
      - NIM_GATEWAY_URL=http://nvidia-nim-gateway:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=prompt-evaluation-platform
    depends_on:
      - postgres
      - redis
      - nvidia-nim-gateway

  observability-platform:
    build: ./ai-observability-platform/backend
    <<: *defaults
    ports:
      - "8105:8000"
      - "4318:4318"  # OTLP HTTP receiver
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=observability-platform
      - POSTGRES_DSN=postgresql+asyncpg://postgres:changeme@postgres:5432/enterprise_ai
      - CLICKHOUSE_DSN=clickhouse://default:@clickhouse:9000/aop
    depends_on:
      - clickhouse
      - postgres
      - redis

volumes:
  pgdata:
  qdrant_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:

networks:
  ai-platform:
    driver: bridge
