name: E2E Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Build stack & run E2E smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services to become healthy
        run: |
          python3 scripts/smoke_test.py || true
          # Give the stack a moment; the smoke script itself retries health checks.
          sleep 5

      - name: Run E2E smoke test
        run: python3 scripts/smoke_test.py

      - name: Tear down
        if: always()
        run: docker compose down -v
